<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="imageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6E1CD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a17b3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="720" fill="url(#imageGradient)"/>

  <!-- Patrón decorativo de fondo -->
  <g opacity="0.1">
    <circle cx="200" cy="150" r="80" fill="white"/>
    <circle cx="1100" cy="550" r="120" fill="white"/>
    <circle cx="950" cy="200" r="60" fill="white"/>
  </g>

  <!-- Logo grande centrado -->
  <g transform="translate(640, 360)">
    <!-- Círculo decorativo -->
    <circle cx="0" cy="0" r="140" fill="white" opacity="0.2"/>

    <!-- Letra E grande -->
    <path d="M -80,-100 L 80,-100 L 80,-70 L -45,-70 L -45,-15 L 65,-15 L 65,15 L -45,15 L -45,70 L 80,70 L 80,100 L -80,100 Z"
          fill="white" filter="url(#glow)" opacity="0.95"/>

    <!-- Texto "Eventify" -->
    <text x="0" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold"
          fill="white" text-anchor="middle" opacity="0.9">
      Eventify
    </text>
  </g>

  <!-- Icono de notificación decorativo -->
  <g transform="translate(1150, 100)">
    <path d="M 0,-20 L -15,0 L -8,0 L -8,15 L 8,15 L 8,0 L 15,0 Z" fill="white" opacity="0.6"/>
    <circle cx="0" cy="20" r="3" fill="white" opacity="0.6"/>
  </g>
</svg>
