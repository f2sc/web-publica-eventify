<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular con gradiente -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2BE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6E1CD9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Círculo de fondo -->
  <circle cx="96" cy="96" r="88" fill="url(#iconGradient)"/>

  <!-- Logo E estilizado -->
  <g transform="translate(96, 96)">
    <!-- Letra E en blanco -->
    <path d="M -30,-40 L 30,-40 L 30,-28 L -18,-28 L -18,-6 L 24,-6 L 24,6 L -18,6 L -18,28 L 30,28 L 30,40 L -30,40 Z"
          fill="white" opacity="0.95"/>

    <!-- Punto de exclamación decorativo -->
    <circle cx="34" cy="-34" r="6" fill="white" opacity="0.9"/>
  </g>
</svg>
